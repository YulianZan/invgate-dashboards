<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDO - Dashboard ITSM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #eef2f7;
    --panel: #ffffff;
    --panel-soft: #f8fafc;
    --panel-strong: #e5edf6;
    --text: #172033;
    --muted: #64748b;
    --border: #d7e0ea;
    --blue: #2563eb;
    --teal: #0f766e;
    --green: #15803d;
    --amber: #b7791f;
    --red: #b91c1c;
    --purple: #7c3aed;
    --coral: #c2410c;
    --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
  }

  * { box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 18px;
  }

  button, select, input { font: inherit; }
  button { cursor: pointer; }

  .shell {
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
    padding: 28px 36px 44px;
  }

  .topbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    margin-bottom: 22px;
  }

  .brand {
    color: var(--blue);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    margin: 0;
    color: var(--text);
    font-size: 38px;
    line-height: 1.05;
    font-weight: 700;
    letter-spacing: 0;
  }

  .meta {
    display: grid;
    gap: 7px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    text-align: right;
  }

  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }

  .toolbar-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .periods { display: flex; flex-wrap: wrap; gap: 8px; }
  .period-btn, .tool-btn, .clear-btn {
    border: 1px solid var(--border);
    background: var(--panel-soft);
    color: var(--text);
    border-radius: 7px;
    padding: 11px 16px;
    font-weight: 700;
    transition: background .15s, border-color .15s, color .15s;
  }

  .period-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
  }

  .tool-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .tool-btn:hover, .clear-btn:hover, .period-btn:hover { border-color: var(--blue); }
  .tool-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }

  .select-wrap { display: flex; align-items: center; gap: 10px; }
  label { color: var(--muted); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: .08em; }
  select {
    min-width: 300px;
    max-width: 520px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 7px;
    padding: 11px 14px;
    font-weight: 600;
  }
  .email-input {
    min-width: 260px;
    max-width: 360px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 7px;
    padding: 11px 14px;
    font-weight: 600;
  }

  .active-filter {
    display: none;
    align-items: center;
    gap: 10px;
    margin: 0 0 18px;
    color: var(--teal);
    font-weight: 700;
    font-size: 16px;
  }
  .active-filter.visible { display: flex; }

  .dashboard { display: grid; gap: 18px; }
  .kpis {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 14px;
  }

  .kpi, .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  .kpi { padding: 20px 20px 18px; min-height: 136px; }
  .kpi-label {
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .kpi-value {
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 42px;
    line-height: 1;
    font-weight: 500;
    overflow-wrap: anywhere;
  }
  .kpi-sub { margin-top: 10px; color: var(--muted); font-size: 15px; font-weight: 600; }
  .kpi.blue .kpi-value { color: var(--blue); }
  .kpi.green .kpi-value { color: var(--green); }
  .kpi.amber .kpi-value { color: var(--amber); }
  .kpi.red .kpi-value { color: var(--red); }
  .kpi.teal .kpi-value { color: var(--teal); }

  .grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 18px;
  }

  .panel { padding: 22px; min-height: 300px; }
  .span-3 { grid-column: span 3; }
  .span-4 { grid-column: span 4; }
  .span-5 { grid-column: span 5; }
  .span-6 { grid-column: span 6; }
  .span-7 { grid-column: span 7; }
  .span-8 { grid-column: span 8; }
  .span-12 { grid-column: span 12; }

  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .panel-title {
    margin: 0;
    color: var(--text);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0;
  }
  .panel-note { color: var(--muted); font-size: 14px; font-weight: 700; }
  .chart-wrap { position: relative; width: 100%; height: 320px; }
  .chart-wrap.short { height: 270px; }
  .chart-wrap.tall { height: 430px; }

  .agent-table { width: 100%; border-collapse: collapse; font-size: 17px; }
  .agent-table tr { border-bottom: 1px solid var(--border); }
  .agent-table tr:last-child { border-bottom: none; }
  .agent-table td { padding: 12px 0; vertical-align: middle; }
  .agent-table td:last-child { text-align: right; font-family: 'DM Mono', monospace; font-size: 16px; color: var(--muted); }
  .bar-bg { margin-top: 8px; height: 7px; background: var(--panel-strong); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--blue); border-radius: 999px; }

  .state {
    min-height: 420px;
    display: grid;
    place-items: center;
    color: var(--muted);
    text-align: center;
    font-weight: 700;
  }
  .state-inner { display: grid; gap: 14px; justify-items: center; }
  .state code {
    max-width: 760px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--red);
    padding: 12px 16px;
    white-space: normal;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 999px;
    animation: spin .85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .exporting .toolbar, .exporting .active-filter, .exporting .tool-actions { box-shadow: none; }

  /* BDO branding */
  .brand-header { display: flex; align-items: center; gap: 20px; }
  .brand-logo { height: 44px; width: auto; display: block; }

  /* Date range row */
  .date-range-row {
    display: none;
    align-items: center;
    gap: 10px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .date-range-row.visible { display: flex; }
  .date-input {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 7px;
    padding: 10px 12px;
    font: inherit;
    font-weight: 600;
  }

  /* Edit mode */
  .kpi { position: relative; }
  .panel { position: relative; }
  .editable { outline: 2px dashed var(--blue); outline-offset: 3px; }
  .hide-panel-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }
  .tool-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* Edit bar */
  .edit-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--panel-strong);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .edit-bar.visible { display: flex; }
  .edit-bar-info { color: var(--muted); font-size: 14px; font-weight: 700; flex-grow: 1; }
  .edit-fields {
    flex-basis: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .field-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 38px;
    color: var(--text);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 14px;
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
  }
  .field-toggle input { width: 16px; height: 16px; }
  .view-name-input {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 7px;
    padding: 10px 12px;
    font: inherit;
    font-weight: 600;
    width: 200px;
  }

  @media (max-width: 1280px) {
    .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .span-3, .span-4, .span-5, .span-6, .span-7, .span-8 { grid-column: span 6; }
  }

  @media (max-width: 860px) {
    body { font-size: 16px; }
    .shell { padding: 18px; }
    .topbar { grid-template-columns: 1fr; }
    .toolbar-top { flex-direction: column; align-items: flex-start; }
    .meta { text-align: left; }
    .tool-actions { justify-content: flex-start; }
    select { min-width: 100%; }
    .select-wrap { align-items: stretch; flex-direction: column; }
    .kpis { grid-template-columns: 1fr; }
    .span-3, .span-4, .span-5, .span-6, .span-7, .span-8, .span-12 { grid-column: span 12; }
    .kpi-value { font-size: 36px; }
    h1 { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="shell" id="capture-root">
  <header class="topbar">
    <div class="brand-header">
      <img class="brand-logo" src="https://cdn.bdo.global/images/bdo_logo/1.0.0/bdo_logo_color.png" alt="BDO" crossorigin="anonymous">
      <div>
        <div class="brand">Service Management · ITSM</div>
        <h1>Dashboard de tickets</h1>
      </div>
    </div>
    <div class="meta">
      <span id="meta-last-extraction">Ultima extraccion: -</span>
      <span id="meta-total">- tickets en DB</span>
      <span id="meta-generated">Vista generada: -</span>
    </div>
  </header>

  <section class="toolbar" aria-label="Filtros del dashboard">
    <div class="toolbar-top">
      <div class="periods" id="periods"></div>
      <div class="tool-actions">
        <div class="select-wrap">
          <label for="area-select">Area</label>
          <select id="area-select" onchange="setArea(this.value)">
            <option value="">Todas las areas</option>
          </select>
        </div>
        <div class="select-wrap">
          <label for="user-email">Usuario</label>
          <input type="email" id="user-email" class="email-input" placeholder="correo@empresa.com" onchange="setUserEmail(this.value)" onblur="setUserEmail(this.value)">
        </div>
        <div class="select-wrap" id="views-select-wrap" style="display:none">
          <label for="views-select">Vista</label>
          <select id="views-select" onchange="loadView(this.value)">
            <option value="">Vista por defecto</option>
          </select>
        </div>
        <button class="tool-btn" type="button" onclick="loadData()">Actualizar</button>
        <button class="tool-btn" id="edit-mode-btn" type="button" onclick="toggleEditMode()">Configurar vista</button>
        <button class="tool-btn primary" type="button" onclick="exportPdf()">Exportar PDF</button>
      </div>
    </div>
    <div class="date-range-row" id="date-range-row">
      <label for="date-from">Desde</label>
      <input type="date" id="date-from" class="date-input">
      <label for="date-to">Hasta</label>
      <input type="date" id="date-to" class="date-input">
      <button class="tool-btn" type="button" onclick="applyCustomRange()">Aplicar</button>
    </div>
  </section>

  <div class="active-filter" id="active-filter">
    <span id="active-filter-text"></span>
    <button class="clear-btn" type="button" onclick="setArea('')">Limpiar</button>
  </div>

  <div class="edit-bar" id="edit-bar">
    <span class="edit-bar-info">Modo edición · clic en × para ocultar paneles</span>
    <button class="tool-btn" type="button" onclick="showAllPanels()">Mostrar todos</button>
    <input type="text" class="view-name-input" id="view-name-input" placeholder="Nombre de la vista...">
    <button class="tool-btn" type="button" onclick="saveCurrentView()">Guardar vista</button>
    <button class="tool-btn" type="button" onclick="deleteCurrentView()">Borrar vista</button>
    <div class="edit-fields" id="edit-fields"></div>
  </div>

  <main id="root">
    <div class="state"><div class="state-inner"><div class="spinner"></div><span>Cargando datos...</span></div></div>
  </main>
</div>

<script>
const PERIODS = [
  { id: 'daily', label: 'Diario' },
  { id: 'weekly', label: 'Semanal' },
  { id: 'monthly', label: 'Mensual' },
  { id: 'prev_month', label: 'Mes Anterior' },
  { id: 'historical', label: 'Historico' },
  { id: 'custom', label: 'Rango' },
];

const PANEL_DEFS = [
  { id: 'kpi-created', label: 'Creados' },
  { id: 'kpi-closed', label: 'Cerrados' },
  { id: 'kpi-solved', label: 'Solucionados' },
  { id: 'kpi-open', label: 'Abiertos ahora' },
  { id: 'kpi-sla', label: 'SLA breach' },
  { id: 'kpi-resolution', label: 'Resolucion prom.' },
  { id: 'panel-trend', label: 'Tendencia' },
  { id: 'panel-sla', label: 'SLA' },
  { id: 'panel-area', label: 'Tickets por area' },
  { id: 'panel-status', label: 'Tickets por estado' },
  { id: 'panel-priority', label: 'Prioridad' },
  { id: 'panel-type', label: 'Tipo' },
  { id: 'panel-resolution', label: 'Resolucion' },
  { id: 'panel-categories', label: 'Top categorias' },
  { id: 'panel-agents', label: 'Carga por agente' },
];

const COLORS = {
  blue: '#2563eb', teal: '#0f766e', green: '#15803d', amber: '#b7791f',
  red: '#b91c1c', purple: '#7c3aed', coral: '#c2410c', sky: '#0284c7', slate: '#475569'
};
const SERIES = [COLORS.blue, COLORS.teal, COLORS.amber, COLORS.purple, COLORS.coral, COLORS.green, COLORS.red, COLORS.sky, COLORS.slate];

const state = { period: 'daily', areaId: '', areaName: '', areas: [], lastData: null, exporting: false, dateFrom: '', dateTo: '', hiddenPanels: new Set(), savedViews: [], activeView: null, editMode: false, userEmail: '' };
let chartInstances = {};

Chart.defaults.color = '#64748b';
Chart.defaults.borderColor = '#d7e0ea';
Chart.defaults.font.family = "'DM Sans', Arial, sans-serif";
Chart.defaults.font.size = 15;

function fmt(value) {
  const n = Number(value || 0);
  return n.toLocaleString('es-CL');
}

function pct(value) {
  return value === null || value === undefined ? '-' : `${value > 0 ? '+' : ''}${value}%`;
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
}

function validEmail(value) {
  return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(String(value || '').trim());
}

function periodLabel() {
  if (state.period === 'custom' && state.dateFrom && state.dateTo)
    return `${state.dateFrom} – ${state.dateTo}`;
  return PERIODS.find(p => p.id === state.period)?.label || 'Historico';
}

function comparisonText(key) {
  const c = state.lastData?.comparison;
  if (!c || c[key] === null || c[key] === undefined) return 'sin comparativo';
  return `${pct(c[key])} vs periodo anterior`;
}

function destroyCharts() {
  Object.values(chartInstances).forEach(chart => chart.destroy());
  chartInstances = {};
}

function makeChart(id, config) {
  const el = document.getElementById(id);
  if (!el) return null;
  chartInstances[id] = new Chart(el, config);
  return chartInstances[id];
}

function chartOptions(extra = {}) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: state.exporting ? false : { duration: 350 },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#172033',
        titleFont: { size: 15, weight: '700' },
        bodyFont: { size: 15, weight: '600' },
        padding: 12,
        callbacks: {
          label: ctx => ` ${ctx.dataset.label || 'Tickets'}: ${fmt(ctx.parsed.y ?? ctx.parsed.x ?? ctx.parsed)}`
        }
      }
    },
    scales: {
      x: { ticks: { font: { size: 14, weight: '600' }, maxRotation: 35 }, grid: { display: false } },
      y: { beginAtZero: true, ticks: { precision: 0, font: { size: 14, weight: '600' } } }
    },
    ...extra
  };
}

function donutOptions() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    cutout: '64%',
    animation: state.exporting ? false : { duration: 350 },
    plugins: {
      legend: { position: 'bottom', labels: { boxWidth: 14, padding: 16, font: { size: 15, weight: '700' } } },
      tooltip: {
        backgroundColor: '#172033',
        titleFont: { size: 15, weight: '700' },
        bodyFont: { size: 15, weight: '600' },
        padding: 12,
        callbacks: {
          label: ctx => {
            const total = ctx.dataset.data.reduce((sum, n) => sum + Number(n || 0), 0);
            const part = total ? Math.round(Number(ctx.parsed || 0) / total * 100) : 0;
            return ` ${ctx.label}: ${fmt(ctx.parsed)} (${part}%)`;
          }
        }
      }
    }
  };
}

function renderPeriodButtons() {
  const wrap = document.getElementById('periods');
  wrap.innerHTML = PERIODS.map(period => `
    <button type="button" class="period-btn ${period.id === state.period ? 'active' : ''}" onclick="setPeriod('${period.id}')">
      ${period.label}
    </button>
  `).join('');
}

function setPeriod(period) {
  state.period = period;
  renderPeriodButtons();
  const row = document.getElementById('date-range-row');
  if (row) row.classList.toggle('visible', period === 'custom');
  if (period === 'custom') {
    const today = new Date().toISOString().slice(0, 10);
    const fromEl = document.getElementById('date-from');
    const toEl = document.getElementById('date-to');
    if (fromEl && !fromEl.value) fromEl.value = today.slice(0, 7) + '-01';
    if (toEl && !toEl.value) toEl.value = today;
  } else {
    loadData();
  }
}

function setArea(areaId) {
  state.areaId = areaId || '';
  const area = state.areas.find(item => item.id === state.areaId);
  state.areaName = area?.name || '';
  const select = document.getElementById('area-select');
  if (select) select.value = state.areaId;
  loadData();
}

function updateAreaSelect(areas) {
  state.areas = areas || [];
  const select = document.getElementById('area-select');
  const current = state.areaId;
  select.innerHTML = '<option value="">Todas las areas</option>' + state.areas.map(area => `
    <option value="${escapeHtml(area.id)}">${escapeHtml(area.name)}</option>
  `).join('');
  select.value = current;
}

function updateActiveFilter() {
  const box = document.getElementById('active-filter');
  const text = document.getElementById('active-filter-text');
  if (state.areaId && state.areaName) {
    text.textContent = `Filtro activo: ${state.areaName}`;
    box.classList.add('visible');
  } else {
    box.classList.remove('visible');
  }
}

function kpi(id, label, value, sub, tone) {
  if (state.hiddenPanels.has(id)) return '';
  const hideBtn = state.editMode ? `<button class="hide-panel-btn" onclick="hidePanel('${id}')" title="Ocultar">×</button>` : '';
  return `
    <div class="kpi ${tone || ''} ${state.editMode ? 'editable' : ''}" data-panel="${id}">
      ${hideBtn}
      <div class="kpi-label">${escapeHtml(label)}</div>
      <div class="kpi-value">${escapeHtml(value)}</div>
      <div class="kpi-sub">${escapeHtml(sub)}</div>
    </div>
  `;
}

function panel(id, title, note, span, body) {
  if (state.hiddenPanels.has(id)) return '';
  const hideBtn = state.editMode ? `<button class="hide-panel-btn" onclick="hidePanel('${id}')" title="Ocultar">×</button>` : '';
  return `
    <section class="panel ${span} ${state.editMode ? 'editable' : ''}" data-panel="${id}">
      <div class="panel-head">
        <h2 class="panel-title">${escapeHtml(title)}</h2>
        <span class="panel-note">${escapeHtml(note || '')}</span>
        ${hideBtn}
      </div>
      ${body}
    </section>
  `;
}

function renderDashboard(data) {
  destroyCharts();
  state.lastData = data;
  updateAreaSelect(data.available_areas || []);
  updateActiveFilter();

  const m = data.metrics || {};
  const s = data.summary || {};
  const period = periodLabel().toLowerCase();
  const last = data.last_extraction ? new Date(data.last_extraction).toLocaleString('es-CL') : '-';
  const generated = data.generated_at ? new Date(data.generated_at).toLocaleString('es-CL') : '-';
  document.getElementById('meta-last-extraction').textContent = `Ultima extraccion: ${last}`;
  document.getElementById('meta-total').textContent = `${fmt(data.total_tickets_in_db)} tickets en DB`;
  document.getElementById('meta-generated').textContent = `Vista generada: ${generated}`;

  const slaTotal = Number(s.sla_ok || 0) + Number(s.sla_breach || 0);
  const slaPct = slaTotal ? Math.round(Number(s.sla_ok || 0) / slaTotal * 100) : 0;
  const areaText = state.areaName || 'Todas las areas';

  document.getElementById('root').innerHTML = `
    <section class="dashboard" id="dashboard">
      <div class="kpis">
        ${kpi('kpi-created', `Creados ${period}`, fmt(s.created_in_period), comparisonText('created_delta_pct'), 'blue')}
        ${kpi('kpi-closed', `Cerrados ${period}`, fmt(s.closed_in_period), comparisonText('closed_delta_pct'), 'green')}
        ${kpi('kpi-solved', `Solucionados ${period}`, fmt(s.solved_in_period), comparisonText('solved_delta_pct'), 'teal')}
        ${kpi('kpi-open', 'Abiertos ahora', fmt(s.open_now), areaText, 'amber')}
        ${kpi('kpi-sla', 'SLA breach', fmt(s.sla_breach), comparisonText('sla_breach_delta_pct'), 'red')}
        ${kpi('kpi-resolution', 'Resolucion prom.', `${fmt(s.avg_resolution_hours)}h`, comparisonText('avg_resolution_delta_pct'), 'purple')}
      </div>

      <div class="grid">
        ${panel('panel-trend', 'Tendencia', periodLabel(), 'span-8', '<div class="chart-wrap"><canvas id="c-trend"></canvas></div>')}
        ${panel('panel-sla', 'SLA', `${slaPct}% cumplido`, 'span-4', '<div class="chart-wrap"><canvas id="c-sla"></canvas></div>')}
        ${panel('panel-area', 'Tickets por area', 'Click para filtrar', 'span-6', '<div class="chart-wrap tall"><canvas id="c-area"></canvas></div>')}
        ${panel('panel-status', 'Tickets por estado', '', 'span-6', '<div class="chart-wrap tall"><canvas id="c-status"></canvas></div>')}
        ${panel('panel-priority', 'Prioridad', '', 'span-4', '<div class="chart-wrap short"><canvas id="c-priority"></canvas></div>')}
        ${panel('panel-type', 'Tipo', '', 'span-4', '<div class="chart-wrap short"><canvas id="c-type"></canvas></div>')}
        ${panel('panel-resolution', 'Resolucion', '', 'span-4', '<div class="chart-wrap short"><canvas id="c-resolution"></canvas></div>')}
        ${panel('panel-categories', 'Top categorias', '', 'span-7', '<div class="chart-wrap tall"><canvas id="c-category"></canvas></div>')}
        ${panel('panel-agents', 'Carga por agente', '', 'span-5', '<div id="agent-table-wrap"></div>')}
      </div>
    </section>
  `;

  renderCharts(m);
  renderAgents(m.by_agent || {});
  renderEditPanelList();
}

function renderCharts(m) {
  const trendLabels = Object.keys(m.trend || m.monthly_trend || {});
  const trendValues = Object.values(m.trend || m.monthly_trend || {});
  makeChart('c-trend', {
    type: 'line',
    data: { labels: trendLabels, datasets: [{ label: 'Tickets', data: trendValues, borderColor: COLORS.blue, backgroundColor: 'rgba(37,99,235,.12)', pointBackgroundColor: COLORS.blue, pointRadius: 5, borderWidth: 3, tension: .32, fill: true }] },
    options: chartOptions({ scales: { x: { grid: { display: false }, ticks: { maxTicksLimit: 14, font: { size: 14, weight: '700' } } }, y: { beginAtZero: true, ticks: { precision: 0, font: { size: 14, weight: '700' } } } } })
  });

  makeChart('c-sla', {
    type: 'doughnut',
    data: { labels: ['Cumplido', 'Breach', 'Sin SLA'], datasets: [{ data: [m.sla?.ok || 0, m.sla?.breach || 0, m.sla?.unknown || 0], backgroundColor: [COLORS.green, COLORS.red, '#94a3b8'], borderColor: '#fff', borderWidth: 3 }] },
    options: donutOptions()
  });

  const areaLabels = Object.keys(m.by_area || {});
  const areaValues = Object.values(m.by_area || {});
  const areaChart = makeChart('c-area', {
    type: 'bar',
    data: { labels: areaLabels, datasets: [{ label: 'Tickets', data: areaValues, backgroundColor: COLORS.teal, borderRadius: 7, borderSkipped: false }] },
    options: chartOptions({ indexAxis: 'y', scales: { x: { beginAtZero: true, ticks: { precision: 0, font: { size: 14, weight: '700' } } }, y: { ticks: { font: { size: 15, weight: '700' } } } } })
  });
  if (areaChart) {
    areaChart.options.onClick = (_, items) => {
      if (!items.length) return;
      const label = areaChart.data.labels[items[0].index];
      const area = state.areas.find(item => item.name === label);
      if (area) setArea(area.id);
    };
    areaChart.update();
  }

  makeChart('c-status', barChart(m.by_status || {}, COLORS.blue, true));
  makeChart('c-priority', donutChart(m.by_priority || {}, [COLORS.green, COLORS.blue, COLORS.amber, COLORS.red, COLORS.purple]));
  makeChart('c-type', donutChart(m.by_type || {}, [COLORS.blue, COLORS.teal, COLORS.amber, COLORS.purple, COLORS.coral]));
  makeChart('c-resolution', barChart(m.resolution_buckets || {}, COLORS.purple, false));
  makeChart('c-category', barChart(m.by_category || {}, COLORS.coral, true));
}

function barChart(values, color, horizontal) {
  return {
    type: 'bar',
    data: { labels: Object.keys(values), datasets: [{ label: 'Tickets', data: Object.values(values), backgroundColor: color, borderRadius: 7, borderSkipped: false }] },
    options: chartOptions(horizontal ? { indexAxis: 'y', scales: { x: { beginAtZero: true, ticks: { precision: 0, font: { size: 14, weight: '700' } } }, y: { ticks: { font: { size: 15, weight: '700' } } } } } : {})
  };
}

function donutChart(values, colors) {
  return {
    type: 'doughnut',
    data: { labels: Object.keys(values), datasets: [{ data: Object.values(values), backgroundColor: colors, borderColor: '#fff', borderWidth: 3 }] },
    options: donutOptions()
  };
}

function renderAgents(byAgent) {
  const entries = Object.entries(byAgent || {});
  const max = entries[0]?.[1] || 1;
  const wrap = document.getElementById('agent-table-wrap');
  if (!wrap) return;
  if (!entries.length) {
    wrap.innerHTML = '<div class="state"><div class="state-inner"><span>Sin datos para este filtro</span></div></div>';
    return;
  }
  wrap.innerHTML = `<table class="agent-table">${entries.map(([name, count]) => `
    <tr>
      <td>
        <strong>${escapeHtml(name)}</strong>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.max(4, Math.round(count / max * 100))}%"></div></div>
      </td>
      <td>${fmt(count)}</td>
    </tr>
  `).join('')}</table>`;
}

// ----- Vistas guardadas -----
const VIEWS_KEY = 'invgate_saved_views';
const USER_EMAIL_KEY = 'invgate_user_email';

function localViewsKey() {
  return state.userEmail ? `${VIEWS_KEY}:${state.userEmail}` : VIEWS_KEY;
}

function normalizeView(raw) {
  return {
    name: raw.name,
    hiddenPanels: raw.hiddenPanels || raw.config?.hiddenPanels || [],
  };
}

async function initViews() {
  state.userEmail = (localStorage.getItem(USER_EMAIL_KEY) || '').trim().toLowerCase();
  const emailInput = document.getElementById('user-email');
  if (emailInput) emailInput.value = state.userEmail;
  await loadViewsForUser();
  renderViewsSelect();
}

async function loadViewsForUser() {
  if (state.userEmail && validEmail(state.userEmail)) {
    try {
      const res = await fetch(`/api/users/${encodeURIComponent(state.userEmail)}/views`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const payload = await res.json();
      state.savedViews = (payload.views || []).map(normalizeView);
      return;
    } catch (error) {
      console.warn('No se pudieron cargar vistas remotas, usando respaldo local', error);
    }
  }
  try { state.savedViews = JSON.parse(localStorage.getItem(localViewsKey()) || '[]').map(normalizeView); } catch { state.savedViews = []; }
}

function renderViewsSelect() {
  const wrap = document.getElementById('views-select-wrap');
  const sel = document.getElementById('views-select');
  if (!wrap || !sel) return;
  wrap.style.display = state.savedViews.length > 0 ? 'flex' : 'none';
  sel.innerHTML = '<option value="">Vista por defecto</option>' +
    state.savedViews.map(v => `<option value="${escapeHtml(v.name)}">${escapeHtml(v.name)}</option>`).join('');
  sel.value = state.activeView || '';
}

function loadView(name) {
  state.activeView = name || null;
  const view = state.savedViews.find(v => v.name === name);
  state.hiddenPanels = new Set(view ? view.hiddenPanels : []);
  if (state.lastData) renderDashboard(state.lastData);
}

async function setUserEmail(value) {
  const email = (value || '').trim().toLowerCase();
  if (email && !validEmail(email)) return;
  state.userEmail = email;
  localStorage.setItem(USER_EMAIL_KEY, email);
  state.activeView = null;
  state.hiddenPanels = new Set();
  await loadViewsForUser();
  renderViewsSelect();
  if (state.lastData) renderDashboard(state.lastData);
}

function currentViewConfig() {
  return { hiddenPanels: [...state.hiddenPanels] };
}

async function saveCurrentView() {
  const input = document.getElementById('view-name-input');
  const name = (input?.value || '').trim();
  if (!name) return;
  const entry = { name, ...currentViewConfig() };
  if (state.userEmail && validEmail(state.userEmail)) {
    await fetch(`/api/users/${encodeURIComponent(state.userEmail)}/views`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, config: currentViewConfig() }),
    });
    await loadViewsForUser();
  } else {
    const existing = state.savedViews.findIndex(v => v.name === name);
    if (existing >= 0) state.savedViews[existing] = entry;
    else state.savedViews.push(entry);
    localStorage.setItem(localViewsKey(), JSON.stringify(state.savedViews));
  }
  state.activeView = name;
  if (input) input.value = '';
  renderViewsSelect();
  toggleEditMode();
}

async function deleteCurrentView() {
  if (!state.activeView) return;
  const name = state.activeView;
  if (state.userEmail && validEmail(state.userEmail)) {
    await fetch(`/api/users/${encodeURIComponent(state.userEmail)}/views/${encodeURIComponent(name)}`, { method: 'DELETE' });
    await loadViewsForUser();
  } else {
    state.savedViews = state.savedViews.filter(v => v.name !== name);
    localStorage.setItem(localViewsKey(), JSON.stringify(state.savedViews));
  }
  state.activeView = null;
  state.hiddenPanels = new Set();
  renderViewsSelect();
  if (state.lastData) renderDashboard(state.lastData);
}

function showAllPanels() {
  state.hiddenPanels = new Set();
  if (state.lastData) renderDashboard(state.lastData);
}

function hidePanel(id) {
  state.hiddenPanels.add(id);
  if (state.lastData) renderDashboard(state.lastData);
}

function setPanelVisible(id, visible) {
  if (visible) state.hiddenPanels.delete(id);
  else state.hiddenPanels.add(id);
  if (state.lastData) renderDashboard(state.lastData);
}

function renderEditPanelList() {
  const wrap = document.getElementById('edit-fields');
  if (!wrap) return;
  wrap.innerHTML = PANEL_DEFS.map(item => `
    <label class="field-toggle">
      <input type="checkbox" ${state.hiddenPanels.has(item.id) ? '' : 'checked'} onchange="setPanelVisible('${item.id}', this.checked)">
      <span>${escapeHtml(item.label)}</span>
    </label>
  `).join('');
}

function toggleEditMode() {
  state.editMode = !state.editMode;
  const btn = document.getElementById('edit-mode-btn');
  const bar = document.getElementById('edit-bar');
  if (btn) { btn.textContent = state.editMode ? 'Salir de edición' : 'Configurar vista'; btn.classList.toggle('active', state.editMode); }
  if (bar) bar.classList.toggle('visible', state.editMode);
  if (state.editMode && state.activeView) {
    const input = document.getElementById('view-name-input');
    if (input) input.value = state.activeView;
  }
  if (state.lastData) renderDashboard(state.lastData);
  renderEditPanelList();
}

// ----- Rango de fechas custom -----
function applyCustomRange() {
  const from = document.getElementById('date-from')?.value;
  const to = document.getElementById('date-to')?.value;
  if (!from || !to || from > to) return;
  state.dateFrom = from;
  state.dateTo = to;
  loadData();
}

function buildUrl() {
  const params = new URLSearchParams({ period: state.period });
  if (state.areaId) params.set('area_id', state.areaId);
  if (state.period === 'custom' && state.dateFrom && state.dateTo) {
    params.set('date_from', state.dateFrom);
    params.set('date_to', state.dateTo);
  }
  return `/api/metrics?${params.toString()}`;
}

function loadData() {
  if (state.period === 'custom' && (!state.dateFrom || !state.dateTo)) {
    renderPeriodButtons();
    return;
  }
  renderPeriodButtons();
  document.getElementById('root').innerHTML = '<div class="state"><div class="state-inner"><div class="spinner"></div><span>Actualizando...</span></div></div>';
  fetch(buildUrl())
    .then(response => {
      if (!response.ok) return response.json().then(err => { throw new Error(err.error || `HTTP ${response.status}`); });
      return response.json();
    })
    .then(renderDashboard)
    .catch(error => {
      document.getElementById('root').innerHTML = `
        <div class="state">
          <div class="state-inner">
            <span>No se pudo cargar el dashboard</span>
            <code>${escapeHtml(error.message)}</code>
          </div>
        </div>`;
    });
}

async function exportPdf() {
  const dashboard = document.getElementById('capture-root');
  if (!dashboard || !state.lastData) return;
  state.exporting = true;
  document.body.classList.add('exporting');
  try {
    const canvas = await html2canvas(dashboard, { scale: 2, backgroundColor: '#eef2f7', useCORS: true });
    const pdf = new window.jspdf.jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const ratio = pageWidth / canvas.width;
    const sliceHeight = Math.floor(pageHeight / ratio);
    let sourceY = 0;
    let page = 0;

    while (sourceY < canvas.height) {
      const partHeight = Math.min(sliceHeight, canvas.height - sourceY);
      const pageCanvas = document.createElement('canvas');
      pageCanvas.width = canvas.width;
      pageCanvas.height = partHeight;
      const ctx = pageCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, sourceY, canvas.width, partHeight, 0, 0, canvas.width, partHeight);
      if (page > 0) pdf.addPage();
      pdf.addImage(pageCanvas.toDataURL('image/png'), 'PNG', 0, 0, pageWidth, partHeight * ratio);
      sourceY += partHeight;
      page += 1;
    }

    pdf.save(`bdo-itsm-dashboard-${state.period}.pdf`);
  } finally {
    document.body.classList.remove('exporting');
    state.exporting = false;
  }
}

initViews();
renderPeriodButtons();
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
